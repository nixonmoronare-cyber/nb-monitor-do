name: Buscar Diário Oficial SP

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  buscar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Executar busca no DO
        run: python buscar_do.py

      - name: Salvar resultado
        run: |
          git config user.name  "NB Monitor Bot"
          git config user.email "bot@nb-monitor"
          git add docs/resultados.json
          git diff --staged --quiet || git commit -m "Atualização: $(date '+%d/%m/%Y %H:%M')"
          git push
